name: Sync docs for GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy public to docs
        run: |
          mkdir -p docs
          cp -r public/* docs/
          touch docs/.nojekyll
      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to docs"
          else
            git commit -m "Sync docs from public for GitHub Pages"
            git push
          fi
